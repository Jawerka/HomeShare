<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="28" y="28" width="456" height="456" rx="96" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="28" y="28" width="456" height="228" rx="96" fill="url(#gloss)"/>

  <!-- Left page (dark) -->
  <g fill="none" stroke="#0F172A" stroke-width="18" stroke-linejoin="round" stroke-linecap="round">
    <path d="M128 132 H248 L292 176 V300"/>
    <path d="M248 132 V176 H292"/>
    <path d="M128 132 V380 H188"/>
  </g>

  <!-- Right page (brand blue) -->
  <g fill="none" stroke="#2563EB" stroke-width="18" stroke-linejoin="round" stroke-linecap="round">
    <path d="M292 176 H380 L424 220 V380 H248 V348"/>
    <path d="M380 176 V220 H424"/>
  </g>

  <!-- Exchange arrows (centered) -->
  <g fill="none" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#2563EB">
      <path d="M178 248 H334"/>
      <path d="M306 220 L334 248 L306 276"/>
    </g>
    <g stroke="#0F172A">
      <path d="M334 312 H178"/>
      <path d="M206 284 L178 312 L206 340"/>
    </g>
  </g>
</svg>
