name: build-release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without v prefix (workflow_dispatch only)'
        required: false
        default: '0.1.0'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: dart-lang/setup-dart@v1
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos run analyze
      - name: Test
        run: |
          cd packages/homeshare_core && dart test
          cd ../homeshare_p2p && dart test
          cd ../../apps/homeshare && flutter pub get && flutter test

  linux-hub:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: Version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version || '0.1.0' }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build hub
        run: |
          cd apps/homeshare_server
          dart pub get
          dart compile exe bin/homeshare_server.dart -o homeshare-hub
          tar -czf "../../homeshare-hub-linux-x64-${{ steps.ver.outputs.version }}.tar.gz" \
            homeshare-hub -C ../../scripts/linux install-hub-ubuntu.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-hub
          path: homeshare-hub-linux-x64-*.tar.gz

  windows:
    needs: quality
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version || '0.1.0' }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build Windows + shell DLL
        shell: pwsh
        run: |
          $env:HOMESHARE_VERSION = "${{ steps.ver.outputs.version }}"
          .\scripts\build-windows.ps1
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress
      - name: Package installer
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $iss = "scripts\windows\homeshare.iss"
          (Get-Content $iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$ver`"" | Set-Content $iss
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" $iss
          if (-not (Test-Path "dist\homeshare-$ver-windows-x64.zip")) {
            Compress-Archive -Path "dist\windows\*" -DestinationPath "dist\homeshare-$ver-windows-x64.zip" -Force
          }
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/homeshare-*-windows-x64.zip
            dist/homeshare-*-windows-x64-setup.exe

  android:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version || '0.1.0' }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No signing secrets — building unsigned/debug-signed APK"
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > apps/homeshare/android/homeshare-release.keystore
          cat > apps/homeshare/android/key.properties <<EOF
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=../homeshare-release.keystore
          EOF
      - name: Build APK
        run: |
          cd apps/homeshare
          flutter pub get
          flutter build apk --release
          mkdir -p ../../dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "../../dist/homeshare-${{ steps.ver.outputs.version }}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/homeshare-*.apk

  publish:
    needs: [linux-hub, windows, android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
